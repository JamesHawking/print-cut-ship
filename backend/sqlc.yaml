version: "2"
sql:
  - engine: postgresql
    # Schema is read from the goose migrations; sqlc understands the +goose
    # annotations and applies only the Up statements.
    schema: internal/db/migrations
    queries: internal/store/queries
    gen:
      go:
        package: store
        out: internal/store
        sql_package: pgx/v5
        emit_json_tags: false
        emit_pointers_for_null_types: true
        overrides:
          - db_type: uuid
            go_type: github.com/google/uuid.UUID
          - db_type: uuid
            nullable: true
            go_type:
              import: github.com/google/uuid
              type: UUID
              pointer: true
