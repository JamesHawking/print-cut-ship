openapi: 3.0.3
info:
  title: Instant Quote API
  description: >-
    Canonical backend for the instant-quote app. Owns pricing (single source
    of truth), quote/order intake, ship-date computation, and the MakerWorld
    model proxy. All prices are gross PLN (VAT-inclusive).
  version: 0.1.0

paths:
  /api/v1/price:
    post:
      operationId: price
      summary: Price a set of parts and compute order totals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PriceRequest'
      responses:
        '200':
          description: Per-part quotes plus order totals
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PriceResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/config:
    get:
      operationId: getConfig
      summary: Pricing catalog for display (processes, lead times, fees)
      responses:
        '200':
          description: The current pricing catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CatalogResponse'

  /api/v1/ship-dates:
    get:
      operationId: getShipDates
      summary: Estimated ship dates per lead time (Europe/Warsaw clock)
      responses:
        '200':
          description: Ship date for each lead time
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShipDatesResponse'

  /api/v1/quotes:
    post:
      operationId: submitQuote
      summary: Submit an order request; prices are recomputed server-side
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SubmitQuoteRequest'
      responses:
        '200':
          description: Quote accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitQuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/quotes/{id}:
    get:
      operationId: getQuote
      summary: >-
        Read back a submitted quote by its id. The id is an unguessable
        capability token (the quoteId returned by submitQuote); the response
        is pricing-only and carries no customer PII.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The quoteId returned by submitQuote, e.g. "Q-1A2B3C4D"
      responses:
        '200':
          description: Quote found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SubmitQuoteResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/auth/request-code:
    post:
      operationId: requestLoginCode
      summary: >-
        Email a 6-digit one-time login code. Always returns 204 — whether the
        email has orders or not, and whether the resend throttle skipped
        sending — so the endpoint never reveals which emails exist. 400 only
        for a malformed email.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RequestCodeRequest'
      responses:
        '204':
          description: Code sent (or silently throttled)
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/auth/verify-code:
    post:
      operationId: verifyLoginCode
      summary: >-
        Verify a 6-digit login code. On success sets the iq_session cookie
        (httpOnly, SameSite=Lax) and returns 204. Codes are single-use,
        expire after 10 minutes, and allow at most 5 attempts.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VerifyCodeRequest'
      responses:
        '204':
          description: Code accepted; session cookie set
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/auth/me:
    get:
      operationId: getMe
      summary: Current session's identity (session restore for the frontend)
      responses:
        '200':
          description: The signed-in user
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MeResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /api/v1/auth/logout:
    post:
      operationId: logout
      summary: Delete the current session and clear the cookie
      responses:
        '204':
          description: Session deleted; cookie cleared

  /api/v1/orders:
    get:
      operationId: listOrders
      summary: >-
        List the signed-in user's orders, newest first. Identity is derived
        from the session server-side; guest checkouts appear via their email.
      responses:
        '200':
          description: Orders for the session's user or email, newest first
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListOrdersResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      operationId: createOrder
      summary: >-
        Create a draft order from a persisted quote. The client sends no
        prices — every money value is copied verbatim from the stored,
        server-recomputed quote rows (anti-tamper boundary).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateOrderRequest'
      responses:
        '200':
          description: Draft order created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateOrderResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orders/{orderId}/checkout:
    post:
      operationId: createOrderCheckout
      summary: >-
        Create (or return the live) payment-provider checkout session for a
        draft order. The returned URL is provider-hosted (Stripe Checkout in
        plan 18, a stub page while PAYMENTS_PROVIDER=stub) — the browser
        redirects to it and never asserts payment itself.
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
          description: The orderId returned by createOrder, e.g. "O-1A2B3C4D"
      responses:
        '200':
          description: Checkout session URL to redirect the browser to
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CheckoutResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/orders/track/{statusToken}:
    get:
      operationId: trackOrder
      summary: >-
        Public order status view. The statusToken (returned by createOrder and
        embedded in the post-payment redirect) is the bearer capability; the
        response is redacted — no internal ids, no raw provider objects, no PII
        beyond the line items.
      parameters:
        - name: statusToken
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Redacted order view
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrackedOrder'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/admin/orders/{orderId}/refund:
    post:
      operationId: refundOrder
      summary: >-
        Refund a paid order (admin only). The provider refund is requested
        here but the status flip to 'refunded' happens in the payment-event
        pipeline (request/confirm split — same rule as payment).
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Refund requested; status flips when the provider confirms
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'

  /api/v1/step-quotes:
    post:
      operationId: submitStepQuote
      summary: Request a manual quote for a STEP file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StepQuoteRequest'
      responses:
        '200':
          description: Manual quote request accepted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StepQuoteResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/makerworld/fetch:
    post:
      operationId: fetchMakerworldModel
      summary: Download a MakerWorld model's 3MF via Bambu Cloud
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MakerworldFetchRequest'
      responses:
        '200':
          description: Raw 3MF bytes
          headers:
            X-Mw-Filename:
              description: URI-encoded file name of the downloaded model
              schema:
                type: string
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/MakerworldError'
        '404':
          $ref: '#/components/responses/MakerworldError'
        '413':
          $ref: '#/components/responses/MakerworldError'
        '502':
          $ref: '#/components/responses/MakerworldError'
        '503':
          $ref: '#/components/responses/MakerworldError'

  /api/v1/files:
    post:
      operationId: createFileUpload
      summary: Reserve a file record and get a presigned upload URL (dedups by hash)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFileRequest'
      responses:
        '200':
          description: File reserved (uploadUrl present) or already stored
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'

  /api/v1/files/{fileId}/confirm:
    post:
      operationId: confirmFileUpload
      summary: Confirm a presigned upload completed; verifies the stored object size
      parameters:
        - name: fileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Upload confirmed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfirmFileResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/BadRequest'

components:
  responses:
    BadRequest:
      description: Invalid request payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    UnauthorizedError:
      description: Missing, invalid, or expired credentials/session
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Forbidden:
      description: Authenticated but lacking the required role
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    Conflict:
      description: The resource is in the wrong state for this operation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ApiError'
    MakerworldError:
      description: MakerWorld download failure
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MakerworldError'

  schemas:
    ProcessId:
      type: string
      enum: [pla, petg, pctg, asa, petg_fr, pa12_cf, iglidur]

    LeadTimeId:
      type: string
      enum: [economy, standard, express]

    EuCountry:
      type: string
      description: Supported EU shipping destinations
      enum:
        [PL, DE, FR, NL, BE, CZ, AT, IT, ES, SE, DK, FI, IE, PT, SK, SI,
         HU, RO, LT, LV, EE, LU, BG, HR, GR]

    Vec3Mm:
      type: object
      required: [x, y, z]
      properties:
        x: { type: number, format: double }
        y: { type: number, format: double }
        z: { type: number, format: double }

    PieceMetrics:
      type: object
      required: [bboxMm]
      properties:
        bboxMm:
          $ref: '#/components/schemas/Vec3Mm'

    MeshMetrics:
      type: object
      description: Pricing-relevant subset of client-side mesh analysis
      required: [volumeCm3, surfaceAreaCm2, bboxMm, usedHullFallback]
      properties:
        volumeCm3:
          type: number
          format: double
          minimum: 0
        surfaceAreaCm2:
          type: number
          format: double
          minimum: 0
        bboxMm:
          $ref: '#/components/schemas/Vec3Mm'
        usedHullFallback:
          type: boolean
        pieces:
          type: array
          description: Per-piece bounding boxes for multi-item 3MF files
          items:
            $ref: '#/components/schemas/PieceMetrics'

    PricePart:
      type: object
      required: [metrics, process, quantity, leadTime]
      properties:
        metrics:
          $ref: '#/components/schemas/MeshMetrics'
        process:
          $ref: '#/components/schemas/ProcessId'
        quantity:
          type: integer
          minimum: 1
          maximum: 10000
        leadTime:
          $ref: '#/components/schemas/LeadTimeId'

    PriceRequest:
      type: object
      required: [parts]
      properties:
        parts:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/PricePart'

    DfmFlag:
      type: object
      required: [code, severity]
      properties:
        code:
          type: string
          enum:
            [exceeds_build_volume, small_feature, min_volume_billed,
             geometry_approximated, multi_plate]
        severity:
          type: string
          enum: [block, warn, info]
        message:
          type: string
          description: English debug prose; the frontend renders from code+params.
        params:
          type: object
          additionalProperties: true
          description: 'Structured values for localized rendering, e.g. {"x": 340}.'
        suggestedProcesses:
          type: array
          items:
            $ref: '#/components/schemas/ProcessId'

    BreakdownLine:
      type: object
      required: [key, amountPln]
      properties:
        key:
          type: string
          enum: [material, machine, finishing, plates]
        label:
          type: string
          description: English debug prose; the frontend renders from key (+count).
        count:
          type: integer
          description: Extra-plate count; only set for key=plates.
        amountPln:
          type: number
          format: double

    PriceBreak:
      type: object
      required: [quantity, unitPricePln, discountFraction]
      properties:
        quantity: { type: integer }
        unitPricePln: { type: number, format: double }
        discountFraction: { type: number, format: double }

    PartQuote:
      type: object
      required:
        [blocked, billableVolumeCm3, weightG, printHours, unitBasePln,
         discountFraction, leadTimeMultiplier, unitPricePln, lineTotalPln,
         breakdown, dfmFlags, priceBreaks]
      properties:
        blocked: { type: boolean }
        billableVolumeCm3: { type: number, format: double }
        weightG:
          type: number
          format: double
          description: Estimated print weight (shell + infill model)
        printHours:
          type: number
          format: double
          description: Estimated print time in hours
        unitBasePln: { type: number, format: double }
        discountFraction: { type: number, format: double }
        leadTimeMultiplier: { type: number, format: double }
        unitPricePln: { type: number, format: double }
        lineTotalPln: { type: number, format: double }
        breakdown:
          type: array
          items:
            $ref: '#/components/schemas/BreakdownLine'
        dfmFlags:
          type: array
          items:
            $ref: '#/components/schemas/DfmFlag'
        priceBreaks:
          type: array
          items:
            $ref: '#/components/schemas/PriceBreak'
        pieceCount:
          type: integer
          description: Present only for multi-piece 3MF parts
        plates:
          type: integer
          description: Present only for multi-piece 3MF parts

    OrderTotals:
      type: object
      required:
        [partsSubtotalPln, minOrderTopUpPln, orderFeePln, shippingPln,
         netTotalPln, vatPln, grossTotalPln, freeShipping, minOrderApplied]
      properties:
        partsSubtotalPln: { type: number, format: double }
        minOrderTopUpPln: { type: number, format: double }
        orderFeePln: { type: number, format: double }
        shippingPln: { type: number, format: double }
        netTotalPln: { type: number, format: double }
        vatPln: { type: number, format: double }
        grossTotalPln: { type: number, format: double }
        freeShipping: { type: boolean }
        minOrderApplied: { type: boolean }

    PriceResponse:
      type: object
      required: [parts, totals]
      properties:
        parts:
          type: array
          items:
            $ref: '#/components/schemas/PartQuote'
        totals:
          $ref: '#/components/schemas/OrderTotals'

    CatalogProcess:
      type: object
      required: [id, label, densityGCm3, plnPerKg, factor, plnPerHour, build]
      properties:
        id:
          $ref: '#/components/schemas/ProcessId'
        label: { type: string }
        densityGCm3: { type: number, format: double }
        plnPerKg: { type: number, format: double }
        factor: { type: number, format: double }
        plnPerHour: { type: number, format: double }
        build:
          $ref: '#/components/schemas/Vec3Mm'

    CatalogLeadTime:
      type: object
      required: [id, mult, businessDays]
      properties:
        id:
          $ref: '#/components/schemas/LeadTimeId'
        mult: { type: number, format: double }
        businessDays: { type: integer }

    DiscountTier:
      type: object
      required: [quantity, fraction]
      properties:
        quantity: { type: integer }
        fraction: { type: number, format: double }

    FdmModel:
      type: object
      required:
        [infillFraction, shellThicknessMm, shellGramsPerPrintHour,
         infillGramsPerPrintHour]
      properties:
        infillFraction: { type: number, format: double }
        shellThicknessMm: { type: number, format: double }
        shellGramsPerPrintHour: { type: number, format: double }
        infillGramsPerPrintHour: { type: number, format: double }

    CatalogResponse:
      type: object
      required:
        [processes, leadTimes, discountTiers, fdm, quantityChips, maxParts,
         minOrderPln, minPartPricePln, orderFeePln, shippingFlatPln,
         freeShippingThresholdPln, vatRate, extraPlateFeePln]
      properties:
        processes:
          type: array
          items:
            $ref: '#/components/schemas/CatalogProcess'
        leadTimes:
          type: array
          items:
            $ref: '#/components/schemas/CatalogLeadTime'
        discountTiers:
          type: array
          items:
            $ref: '#/components/schemas/DiscountTier'
        fdm:
          $ref: '#/components/schemas/FdmModel'
        quantityChips:
          type: array
          items: { type: integer }
        maxParts: { type: integer }
        minOrderPln: { type: number, format: double }
        minPartPricePln: { type: number, format: double }
        orderFeePln: { type: number, format: double }
        shippingFlatPln: { type: number, format: double }
        freeShippingThresholdPln: { type: number, format: double }
        vatRate: { type: number, format: double }
        extraPlateFeePln: { type: number, format: double }

    CalDate:
      type: object
      required: [y, m, d]
      properties:
        y: { type: integer }
        m: { type: integer, description: '1-12' }
        d: { type: integer }

    ShipDate:
      type: object
      required: [leadTime, date, dispatchStartsToday, label]
      properties:
        leadTime:
          $ref: '#/components/schemas/LeadTimeId'
        date:
          $ref: '#/components/schemas/CalDate'
        dispatchStartsToday: { type: boolean }
        label:
          type: string
          description: e.g. "Thu 16 Jul" (canonical engine label; UI formats the date per locale)

    ShipDatesResponse:
      type: object
      required: [shipDates]
      properties:
        shipDates:
          type: array
          items:
            $ref: '#/components/schemas/ShipDate'

    SubmitQuotePart:
      type: object
      required: [fileName, hash, metrics, process, quantity, leadTime]
      properties:
        fileName:
          type: string
          minLength: 1
        hash:
          type: string
          minLength: 1
        fileId:
          type: string
          format: uuid
          description: >-
            The stored file backing this part (plan 02). When present the
            server verifies it exists with a matching hash and links it.
        metrics:
          $ref: '#/components/schemas/MeshMetrics'
        process:
          $ref: '#/components/schemas/ProcessId'
        quantity:
          type: integer
          minimum: 1
          maximum: 10000
        leadTime:
          $ref: '#/components/schemas/LeadTimeId'

    SubmitQuoteRequest:
      type: object
      required: [email, country, parts]
      properties:
        email:
          type: string
          format: email
        country:
          $ref: '#/components/schemas/EuCountry'
        parts:
          type: array
          minItems: 1
          maxItems: 5
          items:
            $ref: '#/components/schemas/SubmitQuotePart'
        clientGrossTotalPln:
          type: number
          format: double
          description: >-
            The gross total the client displayed, for mismatch telemetry.
            The server's own computation is authoritative.
        locale:
          type: string
          enum: [pl, en]
          default: pl
          description: >-
            UI locale at submit time; persisted for downstream emails and
            invoices (plans 05/06 read it).

    SubmitQuoteResponse:
      type: object
      required: [quoteId, totals]
      properties:
        quoteId:
          type: string
          description: e.g. "Q-1A2B3C4D"
        totals:
          $ref: '#/components/schemas/OrderTotals'

    OrderStatus:
      type: string
      description: >-
        Order lifecycle state; transitions are owned by the backend state
        machine (internal/orders).
      enum: [draft, paid, in_production, shipped, delivered, cancelled, refunded]

    OrderSummary:
      type: object
      required:
        [orderId, createdAt, status, grossTotalPln, partCount, fileName,
         leadTime, statusToken]
      properties:
        orderId:
          type: string
          description: e.g. "O-1A2B3C4D"
        createdAt:
          type: string
          format: date-time
        status:
          $ref: '#/components/schemas/OrderStatus'
        grossTotalPln:
          type: number
          format: double
        partCount:
          type: integer
        fileName:
          type: string
          description: First item's file name
        leadTime:
          $ref: '#/components/schemas/LeadTimeId'
        statusToken:
          type: string
          description: >-
            The order's public status-page capability — exposed here because
            this endpoint is session-guarded and the session proves ownership.

    Address:
      type: object
      required: [name, street, city, postalCode]
      properties:
        name:
          type: string
          minLength: 1
          description: Full name (B2C) or company name (B2B)
        street:
          type: string
          minLength: 1
          description: Street and number
        city:
          type: string
          minLength: 1
        postalCode:
          type: string
          minLength: 1

    CreateOrderRequest:
      type: object
      required: [quoteId, email, country, shippingAddress]
      properties:
        quoteId:
          type: string
          description: The quoteId returned by submitQuote, e.g. "Q-1A2B3C4D"
        email:
          type: string
          format: email
        country:
          $ref: '#/components/schemas/EuCountry'
        companyName:
          type: string
          description: B2B only; presence together with nip implies always-invoice
        nip:
          type: string
          pattern: '^[0-9]{10}$'
          description: Polish NIP (10 digits); checksum validated server-side
        invoiceRequested:
          type: boolean
          description: B2C opt-in for a faktura VAT (B2B is always invoiced)
        shippingAddress:
          $ref: '#/components/schemas/Address'
        billingAddress:
          $ref: '#/components/schemas/Address'
          description: Absent ⇒ bill to the shipping address

    CreateOrderResponse:
      type: object
      required: [orderId, statusToken]
      properties:
        orderId:
          type: string
          description: e.g. "O-1A2B3C4D"
        statusToken:
          type: string
          description: >-
            Bearer capability for the public status page
            (GET /api/v1/orders/track/{statusToken}); also embedded in the
            checkout success redirect.

    CheckoutResponse:
      type: object
      required: [url]
      properties:
        url:
          type: string
          description: Provider-hosted checkout URL to redirect the browser to

    TrackedOrderItem:
      type: object
      required: [fileName, process, quantity, leadTime, unitPricePln, lineTotalPln]
      properties:
        fileName:
          type: string
        process:
          $ref: '#/components/schemas/ProcessId'
        quantity:
          type: integer
        leadTime:
          $ref: '#/components/schemas/LeadTimeId'
        unitPricePln:
          type: number
          format: double
        lineTotalPln:
          type: number
          format: double

    TrackedOrder:
      type: object
      required: [orderId, status, createdAt, items, totals]
      properties:
        orderId:
          type: string
        status:
          $ref: '#/components/schemas/OrderStatus'
        createdAt:
          type: string
          format: date-time
        paidAt:
          type: string
          format: date-time
        items:
          type: array
          items:
            $ref: '#/components/schemas/TrackedOrderItem'
        totals:
          $ref: '#/components/schemas/OrderTotals'

    ListOrdersResponse:
      type: object
      required: [orders]
      properties:
        orders:
          type: array
          items:
            $ref: '#/components/schemas/OrderSummary'

    StepQuoteRequest:
      type: object
      required: [email, fileName, fileSize]
      properties:
        email:
          type: string
          format: email
        fileName:
          type: string
          minLength: 1
        fileSize:
          type: integer
          minimum: 0

    StepQuoteResponse:
      type: object
      required: [requestId]
      properties:
        requestId:
          type: string
          description: e.g. "STEP-1A2B3C4D"

    MakerworldFetchRequest:
      type: object
      required: [designId]
      properties:
        designId:
          type: integer
          format: int64
          minimum: 1
        profileId:
          type: integer
          format: int64
          minimum: 1

    MakerworldError:
      type: object
      required: [code]
      properties:
        code:
          type: string
          enum:
            [token_missing, design_not_found, no_instance, auth_expired,
             download_failed, too_large]

    CreateFileRequest:
      type: object
      required: [sha256, fileName, kind, sizeBytes]
      properties:
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
        fileName:
          type: string
          minLength: 1
        kind:
          type: string
          enum: [stl, obj, 3mf, step]
        sizeBytes:
          type: integer
          format: int64
          minimum: 1
          maximum: 104857600

    CreateFileResponse:
      type: object
      required: [fileId, alreadyStored]
      properties:
        fileId:
          type: string
          format: uuid
        uploadUrl:
          type: string
          description: Presigned PUT URL; absent when alreadyStored is true
        alreadyStored:
          type: boolean

    ConfirmFileResponse:
      type: object
      required: [fileId, stored]
      properties:
        fileId:
          type: string
          format: uuid
        stored:
          type: boolean

    RequestCodeRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    VerifyCodeRequest:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
          format: email
        code:
          type: string
          pattern: '^[0-9]{6}$'

    MeResponse:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ApiError:
      type: object
      required: [code, error]
      properties:
        code:
          $ref: '#/components/schemas/ApiErrorCode'
        error:
          type: string
          description: English debug prose; never displayed to users.
        params:
          type: object
          additionalProperties: true
          description: 'Structured values for localized rendering, e.g. {"max": 5}.'

    ApiErrorCode:
      type: string
      description: Machine code the frontend dictionary maps to localized copy.
      enum:
        - invalid_body
        - parts_count
        - unknown_process
        - unknown_lead_time
        - quantity_range
        - invalid_metrics
        - invalid_email
        - unsupported_country
        - missing_file_fields
        - quote_file_invalid
        - quote_not_found
        - missing_file_name
        - invalid_file_size
        - invalid_design_id
        - invalid_profile_id
        - invalid_hash
        - unsupported_kind
        - file_size_range
        - file_not_found
        - file_missing_hash
        - upload_object_missing
        - upload_size_mismatch
        - storage_unavailable
        - code_invalid
        - code_expired
        - too_many_attempts
        - unauthorized
        - order_not_found
        - order_wrong_state
        - quote_already_ordered
        - invalid_nip
        - internal
