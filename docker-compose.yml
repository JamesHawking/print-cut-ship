# Local development services for the instant-quote backend.
#
# Two modes, both needing zero external config:
#
#   1. DB only (fast native hot-reload loop) — the default:
#        docker compose up -d          # postgres on :5432
#        make dev                      # runs backend + frontend natively
#
#   2. Full stack in containers (no Go/Bun toolchain needed):
#        docker compose --profile full up --build
#      Brings up postgres, runs migrations + seed automatically, then serves
#      the API on :8080. The frontend still runs natively (bun dev proxies
#      /api to :8080).
#
# Plan 02 adds MinIO here; plan 03 owns the production Coolify resources.

x-backend: &backend
  build: ./backend
  image: iq-backend-local # shared tag so the image builds once, not per service
  profiles: ["full"]
  environment:
    DATABASE_URL: postgres://dev:dev@postgres:5432/instantquote

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dev
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: instantquote
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev -d instantquote"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Object storage for uploaded models (plan 02). :9000 API, :9001 console.
  # The backend also ensures the bucket at startup, so no init container.
  minio:
    image: minio/minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
      # Browser PUTs to presigned URLs come from the frontend origin (:3000).
      MINIO_API_CORS_ALLOW_ORIGIN: "*"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-shot: apply migrations, then exit. (profile: full)
  migrate:
    <<: *backend
    command: ["migrate"]
    depends_on:
      postgres:
        condition: service_healthy

  # One-shot: seed the active pricing config, then exit. Idempotent. (profile: full)
  seed:
    <<: *backend
    command: ["seed"]
    depends_on:
      migrate:
        condition: service_completed_successfully

  # The API server, started only after migrate + seed succeed. (profile: full)
  backend:
    <<: *backend
    command: ["serve"]
    environment:
      DATABASE_URL: postgres://dev:dev@postgres:5432/instantquote
      PORT: "8080"
      S3_ENDPOINT: minio:9000
      # The browser reaches MinIO on localhost, not the compose network host.
      S3_PUBLIC_ENDPOINT: localhost:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      # Optional: MakerWorld import degrades gracefully when unset.
      BAMBU_CLOUD_TOKEN: ${BAMBU_CLOUD_TOKEN:-}
    ports:
      - "8080:8080"
    depends_on:
      seed:
        condition: service_completed_successfully
      minio:
        condition: service_healthy

volumes:
  pgdata:
  miniodata:
